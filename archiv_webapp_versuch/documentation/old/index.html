<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAI mit HTMX</title>
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
</head>
<body>
    <h1>GPT-Antwort abrufen</h1>
    
    <form hx-post="http://127.0.0.1:8000/openai" hx-target="#result">
        <label for="frage">Stelle eine Frage:</label>
        <input type="text" id="frage" name="frage" required>
        <button type="submit">Frage GPT</button>
    </form>

    <div id="result">Antwort erscheint hier...</div>
</body>
</html>
